services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/prod.db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    volumes:
      - db_data:/data
    networks:
      - app

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - app

volumes:
  db_data:

networks:
  app:
