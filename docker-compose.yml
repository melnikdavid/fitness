services:
  fitness-server:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/prod.db
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
    volumes:
      - db_data:/data
    networks:
      - internal

  fitness-client:
    build: ./client
    restart: unless-stopped
    depends_on:
      - fitness-server
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fitness.rule=Host(`fitness.pagesharper.com`)"
      - "traefik.http.routers.fitness.entrypoints=websecure"
      - "traefik.http.routers.fitness.tls.certresolver=letsencrypt"
      - "traefik.http.services.fitness.loadbalancer.server.port=80"

volumes:
  db_data:

networks:
  internal:
    driver: bridge
